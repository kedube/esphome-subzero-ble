# Minimal ESPHome config for a single Wolf appliance over BLE.
# This example connects to a Wolf DF36450GSP kitchen range.
# Edit the substitutions and secrets to match your setup.

substitutions:
  name: "wolf-range"
  friendly_name: "Wolf Range"

external_components:
  - source:
      type: git
      url: https://github.com/JonGilmore/esphome-subzero-ble
      ref: v3.2.0
    components: [ patch_acl_reassembly, subzero_protocol, subzero_appliance ]

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: true

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_BT_GATTC_CACHE_NVS_FLASH: "n"

logger:
  level: DEBUG
  logs:
    esp32_ble_client: INFO
    ble_client: DEBUG
    ble_sensor: WARN
    esp32_ble_tracker: WARN
    BT_GATTC: WARN

api:
  reboot_timeout: 5min

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  power_save_mode: none

esp32_ble:
  io_capability: keyboard_only
  max_connections: 5

esp32_ble_tracker:
  scan_parameters:
    active: false

ble_client:
  - mac_address: !secret kitchen_range_mac
    id: kitchen_range_ble
    name: "SZG Kitchen Range"
    auto_connect: true

subzero_appliance:
  - type: range
    id: kitchen_range
    ble_client_id: kitchen_range_ble
    name: "Kitchen Range"
    pin: !secret kitchen_range_pin
    # hide_oven2: false  # uncomment for dual-oven appliances
