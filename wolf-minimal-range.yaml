# Minimal ESPHome config for a single Wolf appliance over BLE.
# This example connects to a Wolf DF36450GSP kitchen range.
# Edit the substitutions and secrets to match your setup.

substitutions:
  name: "wolf-range"
  friendly_name: "Wolf Range"

packages:
  - url: https://github.com/JonGilmore/esphome-subzero-ble
    ref: v1.0.0
    files:
      - path: subzero_range.yaml
        vars:
          prefix: "szg"
          appliance_name: "Kitchen Range"
          appliance_mac: !secret kitchen_range_mac
          appliance_pin: !secret kitchen_range_pin

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: true

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_BT_GATTC_CACHE_NVS_FLASH: "n"

logger:
  level: DEBUG
  logs:
    esp32_ble_client: INFO
    ble_client: DEBUG
    ble_sensor: WARN
    esp32_ble_tracker: WARN
    BT_GATTC: WARN

api:
  reboot_timeout: 5min

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  power_save_mode: none
