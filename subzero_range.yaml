  - platform: template
    name: "${appliance_name} Oven 2 Temperature"
    id: ${prefix}_cav2_temp
    unit_of_measurement: "°F"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 0
    icon: "mdi:thermometer"
