# Sub-Zero / Wolf / Cove - Shared BLE Package
# Do not include this file directly. Use one of the appliance-type packages:
#   subzero_fridge.yaml      - Sub-Zero refrigerators and freezers
#   subzero_dishwasher.yaml  - Cove dishwashers
#   subzero_range.yaml       - Wolf ranges and ovens

substitutions:
  poll_offset: "0s"
  poll_via_d4: "false"

# NOTE: external_components is declared by the entry-point yaml, not here.
# Minimal examples use `type: git` with a released ref; personal dev yamls
# use `type: local` pointing at the repo's components/ directory. Both must
# list `patch_acl_reassembly` and `subzero_protocol` so the activations below
# resolve.

patch_acl_reassembly:
subzero_protocol:
json:

esp32_ble:
  io_capability: keyboard_only
  max_connections: 5

esp32_ble_tracker:
  scan_parameters:
    active: false

globals:
  - id: ${prefix}_phase
    type: int
    initial_value: "0"
  - id: ${prefix}_d4_handle
    type: int
    initial_value: "0"
  - id: ${prefix}_d5_handle
    type: int
    initial_value: "0"
  - id: ${prefix}_d6_handle
    type: int
    initial_value: "0"
  - id: ${prefix}_d7_handle
    type: int
    initial_value: "0"
  - id: ${prefix}_d8_handle
    type: int
    initial_value: "0"
  - id: ${prefix}_json_buf
    type: std::string
    restore_value: false
  - id: ${prefix}_stored_pin
    type: std::string
    restore_value: true
    initial_value: '"${appliance_pin}"'
  - id: ${prefix}_pin_confirmed
    type: bool
    restore_value: true
    initial_value: "true"
  - id: ${prefix}_poll_ok
    type: bool
    initial_value: "false"
  - id: ${prefix}_fast_retries
    type: int
    initial_value: "0"
  - id: ${prefix}_poll_miss
    type: int
    initial_value: "0"
  # Unlock-session expiry detection: set true after writing a poll command,
  # cleared only when a full poll response (is_poll=true) arrives. Pushes do
  # NOT clear it - that's the whole point, since pushes keep flowing past
  # unlock expiry while poll responses stop.
  - id: ${prefix}_poll_in_flight
    type: bool
    initial_value: "false"
  - id: ${prefix}_poll_no_response
    type: int
    initial_value: "0"
  # Sticky flag: once ACL corruption is ever observed on this device, disable
  # the unlock-expiry reconnect. Reconnecting never recovers the poll path on
  # fw 8.5 appliances - the ACL bug hits every new session the same way - so
  # the reconnect loop is pure waste. Pushes still work regardless. Zombie
  # detection (15 min of total silence) still fires if the connection truly
  # dies. Cleared only on ESP reboot.
  - id: ${prefix}_acl_corruption_seen
    type: bool
    initial_value: "false"
  - id: ${prefix}_debug_mode
    type: bool
    initial_value: "false"

ble_client:
  - mac_address: ${appliance_mac}
    name: "SZG ${appliance_name}"
    id: ${prefix}_appliance
    auto_connect: true
    on_passkey_request:
      then:
        - lambda: |-
            std::string pin = id(${prefix}_stored_pin);
            if (pin.empty()) {
              ESP_LOGW("ble", "[${appliance_name}] Passkey requested but no PIN set!");
              id(${prefix}_debug).publish_state("Enter PIN in HA, then reconnect.");
            }
            ESP_LOGI("ble", "[${appliance_name}] Replying with PIN: %s", pin.empty() ? "(none)" : pin.c_str());
        - ble_client.passkey_reply:
            id: ${prefix}_appliance
            passkey: !lambda |-
              std::string pin = id(${prefix}_stored_pin);
              return pin.empty() ? 0 : atoi(pin.c_str());
    on_connect:
      then:
        - lambda: |-
            // Request large MTU - fridge firmware sends 40-byte chunks at default MTU,
            // but may use larger chunks if we negotiate higher (dishwasher/range use 244).
            // Custom call required: ESPHome does not expose MTU negotiation.
            auto *cl = id(${prefix}_appliance);
            esp_ble_gattc_send_mtu_req(cl->get_gattc_if(), cl->get_conn_id());
            // Fast path: handles cached from previous connection (bonded)
            if (id(${prefix}_d5_handle) > 0 && id(${prefix}_phase) >= 1) {
              ESP_LOGI("ble", "[${appliance_name}] Reconnected (fast path, d5=%d, retries=%d)",
                id(${prefix}_d5_handle), id(${prefix}_fast_retries));
              id(${prefix}_debug).publish_state("Reconnected, encrypting...");
              id(${prefix}_fast_reconnect).execute();
              return;
            }
            int phase = id(${prefix}_phase);
            if (phase == 0) {
              id(${prefix}_phase) = 1;
              ESP_LOGI("ble", "[${appliance_name}] Connected, discovering chars...");
              id(${prefix}_debug).publish_state("Connected, discovering...");
              id(${prefix}_post_bond).execute();
            } else if (phase >= 1) {
              if (id(${prefix}_d5_handle) > 0) {
                ESP_LOGI("gatt", "[${appliance_name}] D5 already found, skipping");
                return;
              }
              if (id(${prefix}_post_bond).is_running()) {
                ESP_LOGI("ble", "[${appliance_name}] post_bond still running, skipping");
                return;
              }
              id(${prefix}_phase) = phase + 1;
              ESP_LOGI("ble", "[${appliance_name}] Reconnected, starting discovery");
              id(${prefix}_debug).publish_state("Reconnected, discovering...");
              id(${prefix}_post_bond).execute();
            }
    on_disconnect:
      then:
        - lambda: |-
            id(${prefix}_json_buf).clear();
            id(${prefix}_poll_in_flight) = false;
            id(${prefix}_poll_no_response) = 0;
            id(${prefix}_post_bond).stop();
            id(${prefix}_subscribe).stop();
            id(${prefix}_fast_reconnect).stop();
            if (id(${prefix}_d5_handle) > 0 && id(${prefix}_phase) >= 1) {
              id(${prefix}_fast_retries) += 1;
              if (id(${prefix}_fast_retries) >= 3) {
                // Stale bond - clear while disconnected so next connect starts fresh
                ESP_LOGW("ble", "[${appliance_name}] Stale bond (%d failures), clearing for re-pair",
                  id(${prefix}_fast_retries));
                auto *client = id(${prefix}_appliance);
                esp_ble_remove_bond_device(*(esp_bd_addr_t*)client->get_remote_bda());
                id(${prefix}_d5_handle) = 0;
                id(${prefix}_d4_handle) = 0;
                id(${prefix}_d6_handle) = 0;
                id(${prefix}_d7_handle) = 0;
                id(${prefix}_d8_handle) = 0;
                id(${prefix}_phase) = 0;
                id(${prefix}_fast_retries) = 0;
                id(${prefix}_debug).publish_state("Bond cleared, re-pairing on next connect...");
              } else {
                ESP_LOGI("ble", "[${appliance_name}] Disconnected (handles cached, d5=%d, retries=%d)",
                  id(${prefix}_d5_handle), id(${prefix}_fast_retries));
              }
            } else {
              id(${prefix}_phase) = 0;
              id(${prefix}_d4_handle) = 0;
              id(${prefix}_d5_handle) = 0;
              id(${prefix}_d6_handle) = 0;
              id(${prefix}_d7_handle) = 0;
              id(${prefix}_d8_handle) = 0;
              ESP_LOGI("ble", "[${appliance_name}] Disconnected");
            }
            id(${prefix}_debug).publish_state("Disconnected");

sensor:
  - platform: ble_client
    type: characteristic
    ble_client_id: ${prefix}_appliance
    name: "${appliance_name} D5 Notify"
    id: ${prefix}_d5_notify
    internal: true
    service_uuid: "E20A39F4-73F5-4BC4-A12F-17D1AD07A961"
    characteristic_uuid: "08590F7E-DB05-467E-8757-72F6FAEB13D5"
    notify: true
    update_interval: never
    lambda: |-
      auto &buf = id(${prefix}_json_buf);
      if (buf.capacity() < 2048) buf.reserve(2048);
      if (buf.size() > 4096) { buf.clear(); return {}; }
      // ACL fragment-drop workaround: if a new chunk starts with '{' while the
      // current buffer has an unbalanced previous message, the previous one got
      // truncated by ESP-IDF's Bluedroid ACL reassembly bug (fw 8.5 appliances).
      // Discard the corrupt buffer before appending, so garbage doesn't reach
      // the parser or text sensors.
      if (!buf.empty() && x.size() > 0 && x.data()[0] == '{') {
        int prev_depth = 0;
        for (char c : buf) {
          if (c == '{') prev_depth++;
          else if (c == '}') prev_depth--;
        }
        if (prev_depth != 0) {
          ESP_LOGW("szg", "[${appliance_name}] ACL corruption: discarding %d bytes of partial data", (int)buf.size());
          buf.clear();
          // Session IS alive - data is flowing, just can't reassemble it.
          // Don't count as an unanswered poll, or fw 8.5 appliances whose full
          // response reliably hits the ACL bug get stuck in a reconnect loop.
          id(${prefix}_poll_in_flight) = false;
          id(${prefix}_poll_no_response) = 0;
          // Sticky: also disable future unlock-expiry reconnects on this device.
          // Reconnects never recover the poll path for fw 8.5 appliances where
          // the ACL bug repeats on every fresh session.
          id(${prefix}_acl_corruption_seen) = true;
        }
      }
      buf.append((char*)x.data(), x.size());
      // Any notification = connection alive (resets zombie detection)
      id(${prefix}_poll_ok) = true;
      int depth = 0;
      bool complete = false;
      for (char c : buf) {
        if (c == '{') depth++;
        else if (c == '}') { depth--; if (depth == 0) { complete = true; break; } }
      }
      if (complete) {
        id(${prefix}_parse_json).execute();
      }
      return {};

binary_sensor:
  - platform: template
    name: "${appliance_name} Door"
    id: ${prefix}_door_ajar
    device_class: door

  - platform: template
    name: "${appliance_name} Service Required"
    id: ${prefix}_svc_required
    device_class: problem

text_sensor:
  - platform: template
    name: "${appliance_name} Status"
    id: ${prefix}_debug

  - platform: template
    name: "${appliance_name} Raw JSON"
    id: ${prefix}_raw_json
    entity_category: diagnostic

  - platform: template
    name: "${appliance_name} Model"
    id: ${prefix}_model
    icon: "mdi:devices"
    entity_category: diagnostic

  - platform: template
    name: "${appliance_name} Uptime"
    id: ${prefix}_uptime
    icon: "mdi:timer-outline"
    entity_category: diagnostic

  - platform: template
    name: "${appliance_name} Appliance Serial"
    id: ${prefix}_serial
    icon: "mdi:identifier"
    entity_category: diagnostic

  - platform: template
    name: "${appliance_name} Appliance Type"
    id: ${prefix}_appliance_type
    icon: "mdi:shape"
    entity_category: diagnostic

  - platform: template
    name: "${appliance_name} Diagnostic Status"
    id: ${prefix}_diag_status
    icon: "mdi:stethoscope"
    entity_category: diagnostic

  - platform: template
    name: "${appliance_name} Firmware Version"
    id: ${prefix}_fw_version
    icon: "mdi:chip"
    entity_category: diagnostic

  - platform: template
    name: "${appliance_name} API Version"
    id: ${prefix}_api_version
    icon: "mdi:api"
    entity_category: diagnostic

  - platform: template
    name: "${appliance_name} BLE App Version"
    id: ${prefix}_bleapp_version
    icon: "mdi:bluetooth"
    entity_category: diagnostic

  - platform: template
    name: "${appliance_name} OS Version"
    id: ${prefix}_os_version
    icon: "mdi:memory"
    entity_category: diagnostic

  - platform: template
    name: "${appliance_name} RTApp Version"
    id: ${prefix}_rtapp_version
    icon: "mdi:application-cog"
    entity_category: diagnostic

  - platform: template
    name: "${appliance_name} Appliance Board Version"
    id: ${prefix}_board_version
    icon: "mdi:developer-board"
    entity_category: diagnostic

  - platform: template
    name: "${appliance_name} Build Date"
    id: ${prefix}_build_date
    icon: "mdi:calendar-clock"
    entity_category: diagnostic

text:
  - platform: template
    name: "${appliance_name} PIN"
    id: ${prefix}_pin_input
    icon: "mdi:key-variant"
    entity_category: config
    min_length: 0
    max_length: 10
    mode: text
    optimistic: true
    on_value:
      then:
        - lambda: |-
            if (x.length() > 0) {
              id(${prefix}_stored_pin) = x;
              ESP_LOGI("szg", "[${appliance_name}] PIN updated: %s", x.c_str());
            }

switch:
  - platform: template
    name: "${appliance_name} Debug Mode"
    id: ${prefix}_debug_switch
    icon: "mdi:bug"
    entity_category: diagnostic
    optimistic: true
    turn_on_action:
      - lambda: "id(${prefix}_debug_mode) = true;"
    turn_off_action:
      - lambda: "id(${prefix}_debug_mode) = false;"

button:
  - platform: template
    name: "Connect to ${appliance_name}"
    icon: "mdi:bluetooth-connect"
    on_press:
      - logger.log: "[${appliance_name}] Initiating connection..."
      - lambda: |-
          id(${prefix}_phase) = 0;
          id(${prefix}_d4_handle) = 0;
          id(${prefix}_d5_handle) = 0;
          id(${prefix}_d6_handle) = 0;
          id(${prefix}_d7_handle) = 0;
          id(${prefix}_d8_handle) = 0;
          id(${prefix}_json_buf).clear();
          id(${prefix}_post_bond).stop();
          id(${prefix}_subscribe).stop();
      - ble_client.connect:
          id: ${prefix}_appliance

  - platform: template
    name: "${appliance_name} Start Pairing"
    icon: "mdi:key-plus"
    on_press:
      - lambda: |-
          uint16_t d5 = id(${prefix}_d5_handle);
          if (d5 == 0) {
            id(${prefix}_debug).publish_state("ERROR: Not connected. Press Connect first.");
            return;
          }
          auto *client = id(${prefix}_appliance);
          std::string cmd = "{\"cmd\":\"display_pin\",\"params\":{\"duration\": 30}}\n";
          esp_err_t err = esp_ble_gattc_write_char(
            client->get_gattc_if(), client->get_conn_id(),
            d5, cmd.size(), (uint8_t*)cmd.data(),
            ESP_GATT_WRITE_TYPE_RSP, ESP_GATT_AUTH_REQ_NONE);
          ESP_LOGI("ble", "[${appliance_name}] display_pin -> D5 err=%d", err);
          id(${prefix}_debug).publish_state("Check appliance display for PIN.");

  - platform: template
    name: "${appliance_name} Submit PIN & Unlock"
    icon: "mdi:lock-open-variant"
    on_press:
      - lambda: |-
          uint16_t d5 = id(${prefix}_d5_handle);
          if (d5 == 0) {
            id(${prefix}_debug).publish_state("ERROR: Not connected.");
            return;
          }
          std::string pin = id(${prefix}_stored_pin);
          if (pin.empty()) {
            id(${prefix}_debug).publish_state("ERROR: Enter PIN first.");
            return;
          }
          auto *client = id(${prefix}_appliance);
          std::string cmd = "{\"cmd\":\"unlock_channel\",\"params\":{\"pin\":\"" + pin + "\"}}\n";
          esp_err_t err = esp_ble_gattc_write_char(
            client->get_gattc_if(), client->get_conn_id(),
            d5, cmd.size(), (uint8_t*)cmd.data(),
            ESP_GATT_WRITE_TYPE_RSP, ESP_GATT_AUTH_REQ_NONE);
          ESP_LOGI("ble", "[${appliance_name}] unlock_channel (PIN=%s) err=%d", pin.c_str(), err);
          id(${prefix}_debug).publish_state("Unlock sent...");
      - delay: 3s
      - lambda: |-
          uint16_t d5 = id(${prefix}_d5_handle);
          if (d5 == 0) return;
          auto *client = id(${prefix}_appliance);
          std::string cmd = "{\"cmd\":\"get_async\"}\n";
          esp_ble_gattc_write_char(
            client->get_gattc_if(), client->get_conn_id(),
            d5, cmd.size(), (uint8_t*)cmd.data(),
            ESP_GATT_WRITE_TYPE_RSP, ESP_GATT_AUTH_REQ_NONE);

  - platform: template
    name: "Poll ${appliance_name}"
    icon: "mdi:refresh"
    on_press:
      - lambda: |-
          uint16_t d5 = id(${prefix}_d5_handle);
          if (d5 == 0) {
            id(${prefix}_debug).publish_state("ERROR: Not connected");
            return;
          }
          auto *client = id(${prefix}_appliance);
          std::string cmd = "{\"cmd\":\"get_async\"}\n";
          esp_ble_gattc_write_char(
            client->get_gattc_if(), client->get_conn_id(),
            d5, cmd.size(), (uint8_t*)cmd.data(),
            ESP_GATT_WRITE_TYPE_RSP, ESP_GATT_AUTH_REQ_NONE);
          ESP_LOGI("ble", "[${appliance_name}] POLL: get_async");
          id(${prefix}_debug).publish_state("Polling...");

  - platform: template
    name: "Disconnect ${appliance_name}"
    icon: "mdi:bluetooth-off"
    on_press:
      - ble_client.disconnect:
          id: ${prefix}_appliance

  - platform: template
    name: "Reset ${appliance_name} Pairing"
    icon: "mdi:bluetooth-settings"
    entity_category: config
    on_press:
      - logger.log: "[${appliance_name}] Full pairing reset..."
      - lambda: |-
          id(${prefix}_pin_confirmed) = false;
          id(${prefix}_d5_handle) = 0;
          id(${prefix}_d4_handle) = 0;
          id(${prefix}_d6_handle) = 0;
          id(${prefix}_d7_handle) = 0;
          id(${prefix}_d8_handle) = 0;
          id(${prefix}_phase) = 0;
          id(${prefix}_fast_retries) = 0;
          id(${prefix}_poll_miss) = 0;
          id(${prefix}_json_buf).clear();
          auto *client = id(${prefix}_appliance);
          esp_bd_addr_t addr;
          memcpy(addr, client->get_remote_bda(), 6);
          // Clear GATT client cache
          esp_ble_gattc_cache_clean(addr);
          // Remove bond from ESP-IDF BLE security manager
          esp_ble_remove_bond_device(addr);
          ESP_LOGW("ble", "[${appliance_name}] Bond removed, GATT cache cleared, all state reset");
      - ble_client.disconnect:
          id: ${prefix}_appliance
      - delay: 1s
      - ble_client.remove_bond:
          id: ${prefix}_appliance
      - lambda: |-
          id(${prefix}_debug).publish_state("Pairing fully reset. Power-cycle appliance, then press Connect.");

interval:
  - interval: 60s
    then:
      - script.execute: ${prefix}_periodic_poll

script:
  # === Periodic poll - staggered to avoid concurrent BLE transfers ===
  #
  # All BLE command writes (here and in buttons/subscribe) use esp_ble_gattc_write_char
  # directly by HANDLE rather than ESPHome's ble_client.ble_write action (which looks
  # up by UUID). Reason: on fridges, D5 is not visible in the initial service discovery
  # that populates ESPHome's characteristic database - it only appears after bonding +
  # cache refresh. ble_client.ble_write would fail to find D5 on fridges.
  #
  # Two separate reconnect triggers:
  #   (a) Zombie detection: poll_ok is set by ANY D5/D4 indication (push or poll response).
  #       If 15 intervals pass with zero activity, connection is dead - reconnect.
  #       At 60s intervals that's 15 min of total silence.
  #   (b) Unlock-session expiry / init failure: poll_in_flight is set when we write a
  #       get_async (both here and in post_bond) and cleared only by a full poll response
  #       (is_poll=true). Pushes do not clear it. If 2 consecutive polls go unanswered
  #       (while pushes may still arrive), we reconnect. Threshold of 2 at 60s = ~2 min
  #       detection, well under the ~20-25 min unlock window, and still requires one
  #       completed cycle between "start" and "no response" so single glitches don't
  #       trigger spurious reconnects.
  #       EXCEPTION: if acl_corruption_seen is set (ever fired on this device), we
  #       skip (b) entirely. Reconnecting never recovers the poll path on fw 8.5
  #       appliances - the ACL bug hits every new session the same way. Better to
  #       stay connected and rely on pushes than to churn reconnects.
  - id: ${prefix}_periodic_poll
    mode: single
    then:
      - delay: ${poll_offset}
      - lambda: |-
          if (!id(${prefix}_pin_confirmed)) return;
          if (id(${prefix}_subscribe).is_running() || id(${prefix}_post_bond).is_running() || id(${prefix}_fast_reconnect).is_running()) return;
          // Fridges respond on D4 (open channel), dishwashers/ranges on D5
          uint16_t handle = ${poll_via_d4} ? id(${prefix}_d4_handle) : id(${prefix}_d5_handle);
          if (handle == 0) return;
          auto *client = id(${prefix}_appliance);
          if (!client->connected()) return;
          // (a) Zombie detection - no D5 activity at all
          if (id(${prefix}_poll_ok)) {
            id(${prefix}_poll_miss) = 0;
          } else {
            id(${prefix}_poll_miss) += 1;
            if (id(${prefix}_poll_miss) >= 15) {
              ESP_LOGW("szg", "[${appliance_name}] Connection stale (%d intervals, no data), forcing reconnect",
                id(${prefix}_poll_miss));
              id(${prefix}_poll_miss) = 0;
              id(${prefix}_poll_in_flight) = false;
              id(${prefix}_poll_no_response) = 0;
              id(${prefix}_json_buf).clear();
              id(${prefix}_debug).publish_state("Connection stale, reconnecting...");
              client->disconnect();
              return;
            }
          }
          // (b) Unlock-session expiry - previous poll never got a response.
          // If ACL corruption has ever been seen on this device, skip the
          // unlock-expiry reconnect - reconnecting won't recover the poll path
          // (same ACL bug on every new session). Keep the connection alive so
          // pushes still work. Zombie detection still fires if silence persists.
          if (id(${prefix}_poll_in_flight) && !id(${prefix}_acl_corruption_seen)) {
            id(${prefix}_poll_no_response) += 1;
            if (id(${prefix}_poll_no_response) >= 2) {
              ESP_LOGW("szg", "[${appliance_name}] %d polls unanswered (unlock session likely expired), forcing reconnect",
                id(${prefix}_poll_no_response));
              id(${prefix}_poll_no_response) = 0;
              id(${prefix}_poll_in_flight) = false;
              id(${prefix}_json_buf).clear();
              id(${prefix}_debug).publish_state("Polls unresponsive, reconnecting...");
              client->disconnect();
              return;
            }
          } else if (id(${prefix}_poll_in_flight) && id(${prefix}_acl_corruption_seen)) {
            // Keep counter at 0 so log stays clean
            id(${prefix}_poll_no_response) = 0;
          }
          id(${prefix}_poll_ok) = false;
          // Clear any stale partial JSON from interrupted previous transfer
          id(${prefix}_json_buf).clear();
          std::string cmd = "{\"cmd\":\"get_async\"}\n";
          esp_err_t err = esp_ble_gattc_write_char(
            client->get_gattc_if(), client->get_conn_id(),
            handle, cmd.size(), (uint8_t*)cmd.data(),
            ESP_GATT_WRITE_TYPE_RSP, ESP_GATT_AUTH_REQ_NONE);
          if (err != ESP_OK) {
            ESP_LOGW("szg", "[${appliance_name}] Write failed (err=%d), forcing reconnect", err);
            id(${prefix}_debug).publish_state("Write failed, reconnecting...");
            client->disconnect();
            return;
          }
          // Write succeeded - mark poll as in flight for expiry detection.
          id(${prefix}_poll_in_flight) = true;
          ESP_LOGI("szg", "[${appliance_name}] Periodic poll (miss=%d, no_resp=%d, retries=%d)",
            id(${prefix}_poll_miss), id(${prefix}_poll_no_response), id(${prefix}_fast_retries));

  # Post-bond discovery sequence - custom because:
  # 1. On fridges, D5 is not visible in GATT until after bonding + cache refresh.
  #    ESPHome's ble_client performs discovery once at connect and doesn't re-run it.
  # 2. We need to match D4/D5/D6/D7/D8 by UUID suffix and cache handles for fast reconnect.
  # 3. ESPHome does not expose GATT cache management (cache_refresh, cache_clean).
  - id: ${prefix}_post_bond
    mode: restart
    then:
      - delay: 500ms
      - lambda: |-
          auto *client = id(${prefix}_appliance);
          esp_gattc_db_elem_t db[64];
          uint16_t count = 64;
          esp_err_t err = esp_ble_gattc_get_db(
            client->get_gattc_if(), client->get_conn_id(),
            0x0001, 0xFFFF, db, &count);
          ESP_LOGI("poll", "[${appliance_name}] Initial get_db: err=%d count=%d", err, count);
          if (err == ESP_OK) {
            for (int i = 0; i < count; i++) {
              auto &e = db[i];
              const char *t = "?";
              if (e.type == ESP_GATT_DB_PRIMARY_SERVICE) t = "SVC";
              else if (e.type == ESP_GATT_DB_CHARACTERISTIC) t = "CHR";
              else if (e.type == ESP_GATT_DB_DESCRIPTOR) t = "DSC";
              char us[42] = {0};
              if (e.uuid.len == ESP_UUID_LEN_16)
                snprintf(us, sizeof(us), "%04X", e.uuid.uuid.uuid16);
              else if (e.uuid.len == ESP_UUID_LEN_128) {
                uint8_t *u = e.uuid.uuid.uuid128;
                snprintf(us, sizeof(us),
                  "%02X%02X%02X%02X-%02X%02X-%02X%02X-%02X%02X-%02X%02X%02X%02X%02X%02X",
                  u[15],u[14],u[13],u[12],u[11],u[10],u[9],u[8],
                  u[7],u[6],u[5],u[4],u[3],u[2],u[1],u[0]);
              }
              ESP_LOGI("gatt", "  [%d] %s h=%d uuid=%s p=0x%02X", i, t, e.attribute_handle, us, e.properties);
              if (e.type == ESP_GATT_DB_CHARACTERISTIC && e.uuid.len == ESP_UUID_LEN_128) {
                uint8_t suffix = e.uuid.uuid.uuid128[0];
                if (suffix == 0xD4) id(${prefix}_d4_handle) = e.attribute_handle;
                else if (suffix == 0xD5) id(${prefix}_d5_handle) = e.attribute_handle;
                else if (suffix == 0xD6) id(${prefix}_d6_handle) = e.attribute_handle;
                else if (suffix == 0xD7) id(${prefix}_d7_handle) = e.attribute_handle;
                else if (suffix == 0xD8) id(${prefix}_d8_handle) = e.attribute_handle;
              }
            }
          }
          // Always request encryption - some appliances (dishwashers) expose D5
          // before bonding but still require encryption for writes (status=5).
          ESP_LOGI("ble", "[${appliance_name}] D5 %s. Requesting encryption...",
            id(${prefix}_d5_handle) > 0 ? "found immediately" : "not yet visible");
          uint8_t addr[6];
          memcpy(addr, client->get_remote_bda(), 6);
          esp_ble_set_encryption(addr, ESP_BLE_SEC_ENCRYPT_MITM);
          if (id(${prefix}_d5_handle) > 0) {
            id(${prefix}_debug).publish_state("D5 found! Encrypting...");
          } else {
            id(${prefix}_debug).publish_state("Requesting encryption...");
          }
      - delay: 1s
      - lambda: |-
          if (id(${prefix}_d5_handle) > 0) {
            // D5 was found before encryption (e.g. dishwashers).
            // Encryption should be established by now - proceed to subscribe.
            ESP_LOGI("ble", "[${appliance_name}] Post-encryption: D5 already known, subscribing...");
            id(${prefix}_subscribe).execute();
            return;
          }
          auto *client = id(${prefix}_appliance);
          ESP_LOGI("ble", "[${appliance_name}] Post-encryption: refreshing GATT cache...");
          esp_bd_addr_t addr;
          memcpy(addr, client->get_remote_bda(), 6);
          esp_ble_gattc_cache_refresh(addr);
      - delay: 500ms
      - lambda: |-
          if (id(${prefix}_d5_handle) > 0) return;
          auto *client = id(${prefix}_appliance);
          esp_ble_gattc_search_service(client->get_gattc_if(), client->get_conn_id(), NULL);
      - delay: 5s
      - lambda: |-
          if (id(${prefix}_d5_handle) > 0) return;
          auto *client = id(${prefix}_appliance);
          esp_gattc_db_elem_t db[64];
          uint16_t count = 64;
          esp_ble_gattc_get_db(client->get_gattc_if(), client->get_conn_id(), 0x0001, 0xFFFF, db, &count);
          ESP_LOGI("poll", "[${appliance_name}] Poll 1: count=%d", count);
          for (int i = 0; i < count; i++) {
            if (db[i].type == ESP_GATT_DB_CHARACTERISTIC && db[i].uuid.len == ESP_UUID_LEN_128) {
              uint8_t s = db[i].uuid.uuid.uuid128[0];
              if (s == 0xD4) id(${prefix}_d4_handle) = db[i].attribute_handle;
              else if (s == 0xD5) id(${prefix}_d5_handle) = db[i].attribute_handle;
              else if (s == 0xD6) id(${prefix}_d6_handle) = db[i].attribute_handle;
              else if (s == 0xD7) id(${prefix}_d7_handle) = db[i].attribute_handle;
              else if (s == 0xD8) id(${prefix}_d8_handle) = db[i].attribute_handle;
            }
          }
          if (id(${prefix}_d5_handle) > 0) { id(${prefix}_subscribe).execute(); return; }
          id(${prefix}_debug).publish_state("Poll 1: waiting...");
      - delay: 5s
      - lambda: |-
          if (id(${prefix}_d5_handle) > 0) return;
          auto *client = id(${prefix}_appliance);
          esp_gattc_db_elem_t db[64];
          uint16_t count = 64;
          esp_ble_gattc_get_db(client->get_gattc_if(), client->get_conn_id(), 0x0001, 0xFFFF, db, &count);
          ESP_LOGI("poll", "[${appliance_name}] Poll 2: count=%d", count);
          for (int i = 0; i < count; i++) {
            if (db[i].type == ESP_GATT_DB_CHARACTERISTIC && db[i].uuid.len == ESP_UUID_LEN_128) {
              uint8_t s = db[i].uuid.uuid.uuid128[0];
              if (s == 0xD4) id(${prefix}_d4_handle) = db[i].attribute_handle;
              else if (s == 0xD5) id(${prefix}_d5_handle) = db[i].attribute_handle;
              else if (s == 0xD6) id(${prefix}_d6_handle) = db[i].attribute_handle;
              else if (s == 0xD7) id(${prefix}_d7_handle) = db[i].attribute_handle;
              else if (s == 0xD8) id(${prefix}_d8_handle) = db[i].attribute_handle;
            }
          }
          if (id(${prefix}_d5_handle) > 0) { id(${prefix}_subscribe).execute(); return; }
          id(${prefix}_debug).publish_state("Poll 2: waiting...");
      - delay: 5s
      - lambda: |-
          if (id(${prefix}_d5_handle) > 0) return;
          auto *client = id(${prefix}_appliance);
          esp_gattc_db_elem_t db[64];
          uint16_t count = 64;
          esp_ble_gattc_get_db(client->get_gattc_if(), client->get_conn_id(), 0x0001, 0xFFFF, db, &count);
          ESP_LOGI("poll", "[${appliance_name}] Poll 3: count=%d", count);
          for (int i = 0; i < count; i++) {
            if (db[i].type == ESP_GATT_DB_CHARACTERISTIC && db[i].uuid.len == ESP_UUID_LEN_128) {
              uint8_t s = db[i].uuid.uuid.uuid128[0];
              if (s == 0xD4) id(${prefix}_d4_handle) = db[i].attribute_handle;
              else if (s == 0xD5) id(${prefix}_d5_handle) = db[i].attribute_handle;
              else if (s == 0xD6) id(${prefix}_d6_handle) = db[i].attribute_handle;
              else if (s == 0xD7) id(${prefix}_d7_handle) = db[i].attribute_handle;
              else if (s == 0xD8) id(${prefix}_d8_handle) = db[i].attribute_handle;
            }
          }
          if (id(${prefix}_d5_handle) > 0) { id(${prefix}_subscribe).execute(); return; }
          ESP_LOGW("ble", "[${appliance_name}] No D5 after 20s. Reconnecting...");
          id(${prefix}_debug).publish_state("No D5 found. Reconnecting...");
          id(${prefix}_phase) = 1;
      - if:
          condition:
            lambda: "return id(${prefix}_d5_handle) == 0;"
          then:
            - ble_client.disconnect:
                id: ${prefix}_appliance
            - delay: 2s
            - lambda: |-
                auto *client = id(${prefix}_appliance);
                esp_bd_addr_t addr;
                memcpy(addr, client->get_remote_bda(), 6);
                esp_ble_gattc_cache_clean(addr);
                esp_ble_gattc_cache_refresh(addr);
            - delay: 1s
            - ble_client.connect:
                id: ${prefix}_appliance

  - id: ${prefix}_fast_reconnect
    mode: restart
    then:
      # Fast path: skip GATT dump, just encrypt + subscribe + unlock (no auto-poll)
      - lambda: |-
          auto *client = id(${prefix}_appliance);
          uint8_t addr[6];
          memcpy(addr, client->get_remote_bda(), 6);
          esp_ble_set_encryption(addr, ESP_BLE_SEC_ENCRYPT_MITM);
          ESP_LOGI("ble", "[${appliance_name}] Fast reconnect: encryption requested");
      - delay: 1500ms
      - lambda: |-
          id(${prefix}_subscribe).execute();

  - id: ${prefix}_subscribe
    mode: restart
    then:
      # Subscribe D5, then auto-unlock if PIN is saved
      # All commands MUST end with \n - the appliance's serial parser requires it!
      - lambda: |-
          auto *client = id(${prefix}_appliance);
          uint16_t d5 = id(${prefix}_d5_handle);
          if (d5 == 0) {
            ESP_LOGE("ble", "[${appliance_name}] D5 handle not set!");
            id(${prefix}_debug).publish_state("ERROR: D5 handle not found");
            return;
          }
          id(${prefix}_d5_notify)->handle = d5;
          ESP_LOGI("ble", "[${appliance_name}] Injected D5 handle %d", d5);
          uint16_t d4 = id(${prefix}_d4_handle);
          // register_for_notify for local callback, then manual CCCD write
          // (fast reconnect GATT cache may be incomplete → register_for_notify
          //  fails to find CCCD handle internally, so we write it directly)
          esp_ble_gattc_register_for_notify(
            client->get_gattc_if(), client->get_remote_bda(), d5);
          ESP_LOGI("ble", "[${appliance_name}] Subscribe D5 (h=%d)", d5);
          if (d4 > 0) {
            esp_ble_gattc_register_for_notify(
              client->get_gattc_if(), client->get_remote_bda(), d4);
            ESP_LOGI("ble", "[${appliance_name}] Subscribe D4 (h=%d) for diagnostics", d4);
          }
          // Manually write CCCD enable value (0x0002 = indications on).
          // CCCD descriptor is at char_value_handle + 2 (standard BLE layout).
          // Custom write required: ESPHome's `notify: true` auto-writes 0x01 or 0x02
          // based on characteristic properties (NOTIFY bit → 0x01). Sub-Zero requires
          // 0x02 regardless; relying on ESPHome's auto-detection is unsafe.
          uint8_t cccd_on[2] = {0x02, 0x00};
          esp_ble_gattc_write_char(
            client->get_gattc_if(), client->get_conn_id(),
            d5 + 2, sizeof(cccd_on), cccd_on,
            ESP_GATT_WRITE_TYPE_RSP, ESP_GATT_AUTH_REQ_NONE);
          ESP_LOGI("ble", "[${appliance_name}] CCCD write D5 (h=%d)", d5 + 2);
          if (d4 > 0) {
            esp_ble_gattc_write_char(
              client->get_gattc_if(), client->get_conn_id(),
              d4 + 2, sizeof(cccd_on), cccd_on,
              ESP_GATT_WRITE_TYPE_RSP, ESP_GATT_AUTH_REQ_NONE);
            ESP_LOGI("ble", "[${appliance_name}] CCCD write D4 (h=%d)", d4 + 2);
          }
          id(${prefix}_json_buf).clear();
      - delay: 500ms
      - lambda: |-
          auto *client = id(${prefix}_appliance);
          uint16_t d5 = id(${prefix}_d5_handle);
          std::string pin = id(${prefix}_stored_pin);
          if (pin.empty() || !id(${prefix}_pin_confirmed)) {
            ESP_LOGI("ble", "[${appliance_name}] No saved PIN. Waiting for user to pair.");
            id(${prefix}_debug).publish_state("Connected! Press 'Start Pairing', then enter PIN.");
            return;
          }
          std::string cmd = "{\"cmd\":\"unlock_channel\",\"params\":{\"pin\":\"" + pin + "\"}}\n";
          esp_err_t err = esp_ble_gattc_write_char(
            client->get_gattc_if(), client->get_conn_id(),
            d5, cmd.size(), (uint8_t*)cmd.data(),
            ESP_GATT_WRITE_TYPE_RSP, ESP_GATT_AUTH_REQ_NONE);
          ESP_LOGI("ble", "[${appliance_name}] Auto-unlock (PIN=%s) err=%d", pin.c_str(), err);
          id(${prefix}_debug).publish_state("Auto-unlocking...");
      - delay: 1s
      - lambda: |-
          if (!id(${prefix}_pin_confirmed)) return;
          auto *client = id(${prefix}_appliance);
          uint16_t d5 = id(${prefix}_d5_handle);
          id(${prefix}_poll_ok) = false;
          std::string cmd = "{\"cmd\":\"get_async\"}\n";
          esp_err_t err = esp_ble_gattc_write_char(
            client->get_gattc_if(), client->get_conn_id(),
            d5, cmd.size(), (uint8_t*)cmd.data(),
            ESP_GATT_WRITE_TYPE_RSP, ESP_GATT_AUTH_REQ_NONE);
          ESP_LOGI("ble", "[${appliance_name}] get_async err=%d", err);
          // Mark poll as in flight so unlock-expiry detection catches a silent
          // post-bond init failure one interval sooner. Parser clears this
          // on any {"status":0,"resp":...} response (including unlock_channel
          // and this get_async).
          if (err == ESP_OK) id(${prefix}_poll_in_flight) = true;
          id(${prefix}_debug).publish_state("Connected and polling.");
