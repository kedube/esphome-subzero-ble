# Wolf Range/Oven BLE Package
# Include with vars: prefix, appliance_name, appliance_mac, appliance_pin
# Optional vars:
#   hide_oven2: "true" to hide second oven cavity sensors (default: "true")
#
# Example (single oven):
#   packages:
#     kitchen_range: !include
#       file: subzero_range.yaml
#       vars:
#         prefix: "szg"
#         appliance_name: "Kitchen Range"
#         appliance_mac: !secret kitchen_range_mac
#         appliance_pin: !secret kitchen_range_pin
#
# Example (dual oven):
#   packages:
#     dual_oven: !include
#       file: subzero_range.yaml
#       vars:
#         prefix: "szg"
#         appliance_name: "Range"
#         appliance_mac: !secret range_mac
#         appliance_pin: !secret range_pin
#         hide_oven2: "false"

substitutions:
  hide_oven2: "true"

packages:
  base: !include subzero_base.yaml

esphome:
  on_boot:
    - priority: -100
      then:
        - lambda: |-
            id(${prefix}_ktimer_end_time).publish_state("");
            id(${prefix}_ktimer2_end_time).publish_state("");
sensor:
  - platform: template
    name: "${appliance_name} Oven Temperature"
    id: ${prefix}_cav_temp
    unit_of_measurement: "°F"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 0
    icon: "mdi:thermometer"

  - platform: template
    name: "${appliance_name} Oven Set Temperature"
    id: ${prefix}_cav_set_temp
    unit_of_measurement: "°F"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 0
    icon: "mdi:thermometer-check"

  - platform: template
    name: "${appliance_name} Cook Mode"
    id: ${prefix}_cav_cook_mode
    icon: "mdi:stove"
    accuracy_decimals: 0

  - platform: template
    name: "${appliance_name} Gourmet Recipe"
    id: ${prefix}_cav_gourmet_recipe
    icon: "mdi:chef-hat"
    accuracy_decimals: 0

  - platform: template
    name: "${appliance_name} Probe Temperature"
    id: ${prefix}_probe_temp
    unit_of_measurement: "°F"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 0
    icon: "mdi:thermometer-probe"

  - platform: template
    name: "${appliance_name} Probe Set Temperature"
    id: ${prefix}_probe_set_temp
    unit_of_measurement: "°F"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 0
    icon: "mdi:thermometer-probe-off"

  - platform: template
    name: "${appliance_name} Oven 2 Temperature"
    id: ${prefix}_cav2_temp
    unit_of_measurement: "°F"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 0
    icon: "mdi:thermometer"
    internal: ${hide_oven2}

  - platform: template
    name: "${appliance_name} Oven 2 Set Temperature"
    id: ${prefix}_cav2_set_temp
    unit_of_measurement: "°F"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 0
    icon: "mdi:thermometer-check"
    internal: ${hide_oven2}

  - platform: template
    name: "${appliance_name} Oven 2 Cook Mode"
    id: ${prefix}_cav2_cook_mode
    icon: "mdi:stove"
    accuracy_decimals: 0
    internal: ${hide_oven2}

  - platform: template
    name: "${appliance_name} Oven 2 Probe Temperature"
    id: ${prefix}_cav2_probe_temp
    unit_of_measurement: "°F"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 0
    icon: "mdi:thermometer-probe"
    internal: ${hide_oven2}

  - platform: template
    name: "${appliance_name} Oven 2 Probe Set Temperature"
    id: ${prefix}_cav2_probe_set_temp
    unit_of_measurement: "°F"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 0
    icon: "mdi:thermometer-probe-off"
    internal: ${hide_oven2}

