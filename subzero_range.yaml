  - platform: template
    name: "${appliance_name} Oven 2 Door"
    id: ${prefix}_cav2_door_ajar
    device_class: door
    internal: ${hide_oven2}

  - platform: template
    name: "${appliance_name} Oven 2 At Temperature"
    id: ${prefix}_cav2_at_set_temp
    icon: "mdi:thermometer-check"
    internal: ${hide_oven2}

  - platform: template
    name: "${appliance_name} Oven 2 Light"
    id: ${prefix}_cav2_light_on
    icon: "mdi:lightbulb"
