# Cove Dishwasher BLE Package
# Include with vars: prefix, appliance_name, appliance_mac, appliance_pin
# Optional vars:
#   hide_softener: "false" to show water softener sensor (default: "true")
#
# Example:
#   packages:
#     right_dishwasher: !include
#       file: subzero_dishwasher.yaml
#       vars:
#         prefix: "szg"
#         appliance_name: "Right Dishwasher"
#         appliance_mac: !secret right_dishwasher_mac
#         appliance_pin: !secret right_dishwasher_pin
#
# Example (DW2450WS with water softener):
#   packages:
#     dishwasher: !include
#       file: subzero_dishwasher.yaml
#       vars:
#         prefix: "szg"
#         appliance_name: "Dishwasher"
#         appliance_mac: !secret dishwasher_mac
#         appliance_pin: !secret dishwasher_pin
#         hide_softener: "false"

substitutions:
  hide_softener: "true"

packages:
  base: !include subzero_base.yaml

esphome:
  on_boot:
    - priority: -100
      then:
        - lambda: |-
            id(${prefix}_wash_time_remaining).publish_state(0);
            id(${prefix}_wash_cycle_end_time).publish_state("");

sensor:
  - platform: template
    name: "${appliance_name} Wash Status"
    id: ${prefix}_wash_status
    icon: "mdi:dishwasher"
    accuracy_decimals: 0

  - platform: template
    name: "${appliance_name} Wash Cycle"
    id: ${prefix}_wash_cycle
    icon: "mdi:counter"
    accuracy_decimals: 0

  - platform: template
    name: "${appliance_name} Wash Time Remaining"
    id: ${prefix}_wash_time_remaining
    icon: "mdi:timer-sand"
    unit_of_measurement: "min"
    accuracy_decimals: 0
    device_class: duration

binary_sensor:
  - platform: template
    name: "${appliance_name} Wash Cycle Active"
    id: ${prefix}_wash_cycle_on
    icon: "mdi:dishwasher"

  - platform: template
    name: "${appliance_name} Heated Dry"
    id: ${prefix}_heated_dry
    icon: "mdi:heat-wave"

  - platform: template
    name: "${appliance_name} Extended Dry"
    id: ${prefix}_extended_dry
    icon: "mdi:heat-wave"

  - platform: template
    name: "${appliance_name} High Temp Wash"
    id: ${prefix}_high_temp_wash
    icon: "mdi:thermometer-high"

  - platform: template
    name: "${appliance_name} Sanitize Rinse"
    id: ${prefix}_sani_rinse
    icon: "mdi:hand-wash"

  - platform: template
    name: "${appliance_name} Rinse Aid Low"
    id: ${prefix}_rinse_aid_low
    device_class: problem

  - platform: template
    name: "${appliance_name} Light"
    id: ${prefix}_light_on
    icon: "mdi:lightbulb"

  - platform: template
    name: "${appliance_name} Remote Ready"
    id: ${prefix}_remote_ready
    icon: "mdi:remote"

  - platform: template
    name: "${appliance_name} Delay Start"
    id: ${prefix}_delay_start
    icon: "mdi:timer-sand"

  - platform: template
    name: "${appliance_name} Softener Low"
    id: ${prefix}_softener_low
    device_class: problem
    internal: ${hide_softener}

text_sensor:
  - platform: template
    name: "${appliance_name} Wash Cycle End Time"
    id: ${prefix}_wash_cycle_end_time
    icon: "mdi:clock-end"

globals:
  - id: ${prefix}_wash_end_time_str
    type: std::string
    restore_value: false

script:
  - id: ${prefix}_parse_json
    mode: single
    then:
      - lambda: |-
          auto msg = id(${prefix}_json_buf).take_message();
          if (!msg) return;
          bool dbg = id(${prefix}_debug_mode);
          ESP_LOGI("szg", "[${appliance_name}] Parsing JSON (%d bytes)", (int)msg->size());
          if (dbg) {
            esphome::subzero_protocol::chunk_for_log(*msg,
              [](size_t idx, size_t total, const std::string &chunk) {
                ESP_LOGI("szg", "[${appliance_name}] Response[%d/%d]: %s",
                         (int)idx, (int)total, chunk.c_str());
              });
          }
          auto s = esphome::subzero_protocol::parse_dishwasher(*msg);
          if (!s.valid) {
            // status 302 = appliance rejected unlock_channel because its
            // pairing window is closed. Most often happens after a power
            // cycle that rotated the PIN. User must press Start Pairing
            // and re-enter the PIN now shown on the appliance.
            if (msg->find("\"status\":302") != std::string::npos) {
              ESP_LOGE("szg", "[${appliance_name}] Pairing rejected (status 302). The PIN has likely changed - press 'Start Pairing' on the appliance and enter the new PIN in HA.");
              id(${prefix}_debug).publish_state("Pairing required - press Start Pairing and re-enter PIN");
              return;
            }
            ESP_LOGW("szg", "[${appliance_name}] Parse failed or status!=0, skipping (%s...)",
                     esphome::subzero_protocol::sanitize_for_log(*msg, 0, std::min<size_t>(80, msg->size())).c_str());
            return;
          }
          if (dbg) {
            for (const auto &k : s.data_keys)
              ESP_LOGI("szg-debug", "[${appliance_name}] key=%s", k.c_str());
          }
          // PIN confirmation (unlock_channel response)
          if (s.common.pin_confirmed) {
            const std::string &pin = *s.common.pin_confirmed;
            id(${prefix}_stored_pin) = pin;
            id(${prefix}_pin_confirmed) = true;
            id(${prefix}_pin_input).publish_state(pin);
            ESP_LOGI("szg", "[${appliance_name}] PIN confirmed: %s", pin.c_str());
            id(${prefix}_debug).publish_state("PIN confirmed! Channel unlocked.");
          }
          // --- Dishwasher sensors ---
          if (s.door_ajar)                id(${prefix}_door_ajar).publish_state(*s.door_ajar);
          if (s.wash_cycle_on)            id(${prefix}_wash_cycle_on).publish_state(*s.wash_cycle_on);
          if (s.heated_dry_on)            id(${prefix}_heated_dry).publish_state(*s.heated_dry_on);
          if (s.extended_dry_on)          id(${prefix}_extended_dry).publish_state(*s.extended_dry_on);
          if (s.high_temp_wash_on)        id(${prefix}_high_temp_wash).publish_state(*s.high_temp_wash_on);
          if (s.sani_rinse_on)            id(${prefix}_sani_rinse).publish_state(*s.sani_rinse_on);
          if (s.rinse_aid_low)            id(${prefix}_rinse_aid_low).publish_state(*s.rinse_aid_low);
          if (s.softener_low)             id(${prefix}_softener_low).publish_state(*s.softener_low);
          if (s.light_on)                 id(${prefix}_light_on).publish_state(*s.light_on);
          if (s.remote_ready)             id(${prefix}_remote_ready).publish_state(*s.remote_ready);
          if (s.delay_start_timer_active) id(${prefix}_delay_start).publish_state(*s.delay_start_timer_active);
          if (s.wash_status)              id(${prefix}_wash_status).publish_state(*s.wash_status);
          if (s.wash_cycle)               id(${prefix}_wash_cycle).publish_state(*s.wash_cycle);
          if (s.wash_cycle_end_time) {
            id(${prefix}_wash_end_time_str) = *s.wash_cycle_end_time;
            id(${prefix}_wash_cycle_end_time).publish_state(*s.wash_cycle_end_time);
          }
          if (s.wash_time_remaining_min) {
            id(${prefix}_wash_time_remaining).publish_state(*s.wash_time_remaining_min);
            ESP_LOGI("szg", "[${appliance_name}] Wash ends %s, ~%d min remaining",
                     s.wash_cycle_end_time ? s.wash_cycle_end_time->c_str() : "?",
                     *s.wash_time_remaining_min);
          }
          // Clear remaining time when cycle ends (stateful - stays in lambda)
          if (s.wash_cycle_on && !*s.wash_cycle_on) {
            if (id(${prefix}_wash_time_remaining).state > 0)
              id(${prefix}_wash_time_remaining).publish_state(0);
          }
          // --- Common ---
          if (s.common.service_required)  id(${prefix}_svc_required).publish_state(*s.common.service_required);
          if (s.common.appliance_model)   id(${prefix}_model).publish_state(*s.common.appliance_model);
          if (s.common.uptime)            id(${prefix}_uptime).publish_state(*s.common.uptime);
          if (s.common.appliance_serial)  id(${prefix}_serial).publish_state(*s.common.appliance_serial);
          if (s.common.appliance_type)    id(${prefix}_appliance_type).publish_state(*s.common.appliance_type);
          if (s.common.diagnostic_status) id(${prefix}_diag_status).publish_state(*s.common.diagnostic_status);
          if (s.common.build_date)        id(${prefix}_build_date).publish_state(*s.common.build_date);
          if (s.common.version.fw)        id(${prefix}_fw_version).publish_state(*s.common.version.fw);
          if (s.common.version.api)       id(${prefix}_api_version).publish_state(*s.common.version.api);
          if (s.common.version.bleapp)    id(${prefix}_bleapp_version).publish_state(*s.common.version.bleapp);
          if (s.common.version.os)        id(${prefix}_os_version).publish_state(*s.common.version.os);
          if (s.common.version.rtapp)     id(${prefix}_rtapp_version).publish_state(*s.common.version.rtapp);
          if (s.common.version.appliance) id(${prefix}_board_version).publish_state(*s.common.version.appliance);
          id(${prefix}_poll_ok) = true;
          id(${prefix}_fast_retries) = 0;
