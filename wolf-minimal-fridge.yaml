substitutions:
  name: "subzero-fridge"
  friendly_name: "Main Fridge"

packages:
  - url: https://github.com/JonGilmore/esphome-subzero-ble
    ref: v1.0.0
    files:
      - path: subzero_fridge.yaml
        vars:
          prefix: "szg0"
          appliance_name: "Main Fridge"
          appliance_mac: !secret main_fridge_mac
          appliance_pin: !secret main_fridge_pin

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: true

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_BT_GATTC_CACHE_NVS_FLASH: "n"

logger:
  level: DEBUG
  logs:
    esp32_ble_client: INFO
    ble_client: DEBUG
    ble_sensor: WARN
    esp32_ble_tracker: WARN
    BT_GATTC: WARN

api:
  reboot_timeout: 5min

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  power_save_mode: none
