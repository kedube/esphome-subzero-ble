  - platform: template
    name: "${appliance_name} Oven 2 Set Temperature"
    id: ${prefix}_cav2_set_temp
    unit_of_measurement: "°F"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 0
    icon: "mdi:thermometer-check"
    internal: ${hide_oven2}

  - platform: template
    name: "${appliance_name} Oven 2 Cook Mode"
    id: ${prefix}_cav2_cook_mode
    icon: "mdi:stove"
