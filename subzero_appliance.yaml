# Sub-Zero / Wolf / Cove Appliance BLE Package
# Include with vars: prefix, appliance_name, appliance_mac, appliance_pin
# Optional vars: freezer_sensors_internal, ice_maker_sensor_internal,
#   dishwasher_sensors_internal, range_sensors_internal
#   Set to "false" to expose appliance-specific sensors in HA
#
# Example:
#   packages:
#     basement_fridge: !include
#       file: subzero_appliance.yaml
#       vars:
#         prefix: "szg"
#         appliance_name: "Basement Fridge"
#         appliance_mac: !secret basement_fridge_mac
#         appliance_pin: !secret basement_fridge_pin
#     main_fridge: !include
#       file: subzero_appliance.yaml
#       vars:
#         prefix: "szg2"
#         appliance_name: "Main Fridge"
#         appliance_mac: !secret main_fridge_mac
#         appliance_pin: !secret main_fridge_pin
#         freezer_sensors_internal: "false"
#         ice_maker_sensor_internal: "false"
#     right_dishwasher: !include
#       file: subzero_appliance.yaml
#       vars:
#         prefix: "szg"
#         appliance_name: "Right Dishwasher"
#         appliance_mac: !secret right_dishwasher_mac
#         appliance_pin: !secret right_dishwasher_pin
#         dishwasher_sensors_internal: "false"
#         fridge_sensors_internal: "true"
#         freezer_sensors_internal: "true"
#         ice_maker_sensor_internal: "true"
#         sabbath_sensor_internal: "true"

substitutions:
  freezer_sensors_internal: "true"
  ice_maker_sensor_internal: "true"
  sabbath_sensor_internal: "true"
  dishwasher_sensors_internal: "true"
  range_sensors_internal: "true"
  fridge_sensors_internal: "false"

globals:
  - id: ${prefix}_phase
    type: int
    initial_value: "0"
  - id: ${prefix}_d4_handle
    type: int
    initial_value: "0"
  - id: ${prefix}_d5_handle
    type: int
    initial_value: "0"
  - id: ${prefix}_json_buf
    type: std::string
    restore_value: false
  - id: ${prefix}_stored_pin
    type: std::string
    restore_value: true
    initial_value: '"${appliance_pin}"'
  - id: ${prefix}_pin_confirmed
    type: bool
    restore_value: true
    initial_value: "true"
  - id: ${prefix}_poll_ok
    type: bool
    initial_value: "false"

ble_client:
  - mac_address: ${appliance_mac}
    name: "SZG ${appliance_name}"
    id: ${prefix}_appliance
    auto_connect: true
    on_passkey_request:
      then:
        - lambda: |-
            std::string pin = id(${prefix}_stored_pin);
            if (pin.empty()) {
              ESP_LOGW("ble", "[${appliance_name}] Passkey requested but no PIN set!");
              id(${prefix}_debug).publish_state("Enter PIN in HA, then reconnect.");
            }
            ESP_LOGI("ble", "[${appliance_name}] Replying with PIN: %s", pin.empty() ? "(none)" : pin.c_str());
        - ble_client.passkey_reply:
            id: ${prefix}_appliance
            passkey: !lambda |-
              std::string pin = id(${prefix}_stored_pin);
              return pin.empty() ? 0 : atoi(pin.c_str());
    on_connect:
      then:
        - lambda: |-
            // Fast path: handles cached from previous connection (bonded)
            if (id(${prefix}_d5_handle) > 0 && id(${prefix}_phase) >= 1) {
              ESP_LOGI("ble", "[${appliance_name}] Reconnected (fast path, d5=%d)", id(${prefix}_d5_handle));
              id(${prefix}_debug).publish_state("Reconnected, encrypting...");
              id(${prefix}_fast_reconnect).execute();
              return;
            }
            int phase = id(${prefix}_phase);
            if (phase == 0) {
              id(${prefix}_phase) = 1;
              ESP_LOGI("ble", "[${appliance_name}] Connected, discovering chars...");
              id(${prefix}_debug).publish_state("Connected, discovering...");
              id(${prefix}_post_bond).execute();
            } else if (phase >= 1) {
              if (id(${prefix}_d5_handle) > 0) {
                ESP_LOGI("gatt", "[${appliance_name}] D5 already found, skipping");
                return;
              }
              if (id(${prefix}_post_bond).is_running()) {
                ESP_LOGI("ble", "[${appliance_name}] post_bond still running, skipping");
                return;
              }
              id(${prefix}_phase) = phase + 1;
              ESP_LOGI("ble", "[${appliance_name}] Reconnected, starting discovery");
              id(${prefix}_debug).publish_state("Reconnected, discovering...");
              id(${prefix}_post_bond).execute();
            }
    on_disconnect:
      then:
        - lambda: |-
            id(${prefix}_json_buf).clear();
            id(${prefix}_post_bond).stop();
            id(${prefix}_subscribe).stop();
            id(${prefix}_fast_reconnect).stop();
            if (id(${prefix}_d5_handle) > 0 && id(${prefix}_phase) >= 1) {
              // Keep handles cached for fast reconnect (bonded)
              ESP_LOGI("ble", "[${appliance_name}] Disconnected (handles cached, d5=%d)", id(${prefix}_d5_handle));
            } else {
              id(${prefix}_phase) = 0;
              id(${prefix}_d4_handle) = 0;
              id(${prefix}_d5_handle) = 0;
              ESP_LOGI("ble", "[${appliance_name}] Disconnected");
            }
            id(${prefix}_debug).publish_state("Disconnected");

