# Sub-Zero Fridge/Freezer BLE Package
# Include with vars: prefix, appliance_name, appliance_mac, appliance_pin
# Optional vars:
#   hide_freezer: "true" to hide freezer temp & door (default: "false")
#   hide_ice_maker: "true" to hide ice maker (default: "false")
#   hide_sabbath: "true" to hide sabbath mode (default: "false")
#   hide_crisper: "false" to show crisper drawer temp (default: "true")
#   hide_air_filter: "false" to show air filter sensors (default: "true")
#   hide_water_filter: "false" to show water filter sensor (default: "true")
#
# Example (fridge/freezer combo - all sensors exposed):
#   packages:
#     main_fridge: !include
#       file: subzero_fridge.yaml
#       vars:
#         prefix: "szg"
#         appliance_name: "Main Fridge"
#         appliance_mac: !secret main_fridge_mac
#         appliance_pin: !secret main_fridge_pin
#
# Example (fridge-only - no freezer or ice maker):
#   packages:
#     basement_fridge: !include
#       file: subzero_fridge.yaml
#       vars:
#         prefix: "szg"
#         appliance_name: "Basement Fridge"
#         appliance_mac: !secret basement_fridge_mac
#         appliance_pin: !secret basement_fridge_pin
#         hide_freezer: "true"
#         hide_ice_maker: "true"
#
# Example (wine fridge - dual zone, no freezer or ice maker):
#   packages:
#     wine_fridge: !include
#       file: subzero_fridge.yaml
#       vars:
#         prefix: "szg"
#         appliance_name: "Wine Fridge"
#         appliance_mac: !secret wine_fridge_mac
#         appliance_pin: !secret wine_fridge_pin
#         hide_freezer: "true"
#         hide_ice_maker: "true"
#         hide_wine: "false"
#
# Example (fridge with refrigerator drawer - e.g. PRO3650G):
#   packages:
#     fridge: !include
#       file: subzero_fridge.yaml
#       vars:
#         prefix: "szg"
#         appliance_name: "Fridge"
#         appliance_mac: !secret fridge_mac
#         appliance_pin: !secret fridge_pin
#         hide_ref_drawer: "false"

substitutions:
  hide_freezer: "false"
  hide_ice_maker: "false"
  hide_sabbath: "false"
  hide_wine: "true"
  hide_ref_drawer: "true"
  hide_crisper: "true"
  hide_air_filter: "true"
  hide_water_filter: "true"

packages:
  base: !include subzero_base.yaml

sensor:
  - platform: template
    name: "${appliance_name} Set Temperature"
    id: ${prefix}_set_temp
    unit_of_measurement: "°F"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 0
    icon: "mdi:thermometer"

  - platform: template
    name: "${appliance_name} Freezer Set Temperature"
    id: ${prefix}_frz_set_temp
    unit_of_measurement: "°F"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 0
    icon: "mdi:snowflake-thermometer"
    internal: ${hide_freezer}

  - platform: template
    name: "${appliance_name} Wine Zone Upper Set Temperature"
    id: ${prefix}_wine_set_temp
    unit_of_measurement: "°F"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 0
    icon: "mdi:glass-wine"
    internal: ${hide_wine}

  - platform: template
    name: "${appliance_name} Wine Zone Lower Set Temperature"
    id: ${prefix}_wine2_set_temp
    unit_of_measurement: "°F"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 0
    icon: "mdi:glass-wine"
    internal: ${hide_wine}

  - platform: template
    name: "${appliance_name} Refrigerator Drawer Set Temperature"
    id: ${prefix}_ref2_set_temp
    unit_of_measurement: "°F"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 0
    icon: "mdi:thermometer"
    internal: ${hide_ref_drawer}

  - platform: template
    name: "${appliance_name} Crisper Drawer Set Temperature"
    id: ${prefix}_crisp_set_temp
    unit_of_measurement: "°F"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 0
    icon: "mdi:thermometer"
    internal: ${hide_crisper}

  - platform: template
    name: "${appliance_name} Air Filter Remaining"
    id: ${prefix}_air_filter_pct
    unit_of_measurement: "%"
    state_class: measurement
    accuracy_decimals: 0
    icon: "mdi:air-filter"
    internal: ${hide_air_filter}

  - platform: template
    name: "${appliance_name} Water Filter Remaining"
    id: ${prefix}_water_filter_pct
    unit_of_measurement: "%"
    state_class: measurement
    accuracy_decimals: 0
    icon: "mdi:water-percent"
    internal: ${hide_water_filter}

binary_sensor:
  - platform: template
    name: "${appliance_name} Sabbath Mode"
    id: ${prefix}_sabbath_on
    icon: "mdi:candelabra"
    internal: ${hide_sabbath}

  - platform: template
    name: "${appliance_name} Freezer Door"
    id: ${prefix}_frz_door_ajar
    device_class: door
    internal: ${hide_freezer}

  - platform: template
    name: "${appliance_name} Ice Maker"
    id: ${prefix}_ice_maker
    icon: "mdi:ice-cream"
    internal: ${hide_ice_maker}

  - platform: template
    name: "${appliance_name} Wine Door"
    id: ${prefix}_wine_door_ajar
    device_class: door
    internal: ${hide_wine}

  - platform: template
    name: "${appliance_name} Wine Temperature Alert"
    id: ${prefix}_wine_temp_alert
    device_class: problem
    internal: ${hide_wine}

  - platform: template
    name: "${appliance_name} Refrigerator Drawer Door"
    id: ${prefix}_ref2_door_ajar
    device_class: door
    internal: ${hide_ref_drawer}

  - platform: template
    name: "${appliance_name} Air Filter"
    id: ${prefix}_air_filter_on
    icon: "mdi:air-filter"
    internal: ${hide_air_filter}

script:
  - id: ${prefix}_parse_json
    mode: single
    then:
      - lambda: |-
          auto msg = id(${prefix}_json_buf).take_message();
          if (!msg) return;
          bool dbg = id(${prefix}_debug_mode);
          ESP_LOGI("szg", "[${appliance_name}] Parsing JSON (%d bytes)", (int)msg->size());
          if (dbg) {
            // Chunked so the full payload survives the per-line log budget.
            // Grep `Response\[` and concatenate to reassemble - used for fixture
            // capture. Gated on debug mode so normal operation never logs raw
            // buf contents.
            esphome::subzero_protocol::chunk_for_log(*msg,
              [](size_t idx, size_t total, const std::string &chunk) {
                ESP_LOGI("szg", "[${appliance_name}] Response[%d/%d]: %s",
                         (int)idx, (int)total, chunk.c_str());
              });
          }
          auto s = esphome::subzero_protocol::parse_fridge(*msg);
          if (!s.valid) {
            // status 302 = appliance rejected unlock_channel because its
            // pairing window is closed. Most often happens after a power
            // cycle that rotated the PIN. User must press Start Pairing
            // and re-enter the PIN now shown on the appliance.
            if (msg->find("\"status\":302") != std::string::npos) {
              ESP_LOGE("szg", "[${appliance_name}] Pairing rejected (status 302). The PIN has likely changed - press 'Start Pairing' on the appliance and enter the new PIN in HA.");
              id(${prefix}_debug).publish_state("Pairing required - press Start Pairing and re-enter PIN");
              return;
            }
            ESP_LOGW("szg", "[${appliance_name}] Parse failed or status!=0, skipping (%s...)",
                     esphome::subzero_protocol::sanitize_for_log(*msg, 0, std::min<size_t>(80, msg->size())).c_str());
            return;
          }
          if (dbg) {
            for (const auto &k : s.data_keys)
              ESP_LOGI("szg-debug", "[${appliance_name}] key=%s", k.c_str());
          }
          // PIN confirmation (unlock_channel response)
          if (s.common.pin_confirmed) {
            const std::string &pin = *s.common.pin_confirmed;
            id(${prefix}_stored_pin) = pin;
            id(${prefix}_pin_confirmed) = true;
            id(${prefix}_pin_input).publish_state(pin);
            ESP_LOGI("szg", "[${appliance_name}] PIN confirmed: %s", pin.c_str());
            id(${prefix}_debug).publish_state("PIN confirmed! Channel unlocked.");
          }
          // --- Fridge sensors ---
          if (s.ref_set_temp) id(${prefix}_set_temp).publish_state(*s.ref_set_temp);
          if (s.door_ajar)    id(${prefix}_door_ajar).publish_state(*s.door_ajar);
          // --- Freezer sensors ---
          if (s.frz_set_temp)  id(${prefix}_frz_set_temp).publish_state(*s.frz_set_temp);
          if (s.frz_door_ajar) id(${prefix}_frz_door_ajar).publish_state(*s.frz_door_ajar);
          if (s.ice_maker_on)  id(${prefix}_ice_maker).publish_state(*s.ice_maker_on);
          // --- Refrigerator drawer sensors ---
          if (s.ref2_set_temp)  id(${prefix}_ref2_set_temp).publish_state(*s.ref2_set_temp);
          if (s.ref2_door_ajar) id(${prefix}_ref2_door_ajar).publish_state(*s.ref2_door_ajar);
          // --- Wine sensors ---
          if (s.wine_door_ajar)     id(${prefix}_wine_door_ajar).publish_state(*s.wine_door_ajar);
          if (s.wine_set_temp)      id(${prefix}_wine_set_temp).publish_state(*s.wine_set_temp);
          if (s.wine2_set_temp)     id(${prefix}_wine2_set_temp).publish_state(*s.wine2_set_temp);
          if (s.wine_temp_alert_on) id(${prefix}_wine_temp_alert).publish_state(*s.wine_temp_alert_on);
          // --- Crisper drawer sensors ---
          if (s.crisp_set_temp) id(${prefix}_crisp_set_temp).publish_state(*s.crisp_set_temp);
          // --- Filter sensors ---
          if (s.air_filter_on)              id(${prefix}_air_filter_on).publish_state(*s.air_filter_on);
          if (s.air_filter_pct_remaining)   id(${prefix}_air_filter_pct).publish_state(*s.air_filter_pct_remaining);
          if (s.water_filter_pct_remaining) id(${prefix}_water_filter_pct).publish_state(*s.water_filter_pct_remaining);
          // --- Common ---
          if (s.common.sabbath_on)        id(${prefix}_sabbath_on).publish_state(*s.common.sabbath_on);
          if (s.common.service_required)  id(${prefix}_svc_required).publish_state(*s.common.service_required);
          if (s.common.appliance_model)   id(${prefix}_model).publish_state(*s.common.appliance_model);
          if (s.common.uptime)            id(${prefix}_uptime).publish_state(*s.common.uptime);
          if (s.common.appliance_serial)  id(${prefix}_serial).publish_state(*s.common.appliance_serial);
          if (s.common.appliance_type)    id(${prefix}_appliance_type).publish_state(*s.common.appliance_type);
          if (s.common.diagnostic_status) id(${prefix}_diag_status).publish_state(*s.common.diagnostic_status);
          if (s.common.build_date)        id(${prefix}_build_date).publish_state(*s.common.build_date);
          if (s.common.version.fw)        id(${prefix}_fw_version).publish_state(*s.common.version.fw);
          if (s.common.version.api)       id(${prefix}_api_version).publish_state(*s.common.version.api);
          if (s.common.version.bleapp)    id(${prefix}_bleapp_version).publish_state(*s.common.version.bleapp);
          if (s.common.version.os)        id(${prefix}_os_version).publish_state(*s.common.version.os);
          if (s.common.version.rtapp)     id(${prefix}_rtapp_version).publish_state(*s.common.version.rtapp);
          if (s.common.version.appliance) id(${prefix}_board_version).publish_state(*s.common.version.appliance);
          id(${prefix}_poll_ok) = true;
          // Any valid response means the connection is functional, so prior
          // fast-reconnect failures aren't relevant anymore.
          id(${prefix}_fast_retries) = 0;
