name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: "minor"
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: "Mark as pre-release"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current version
        id: current
        run: |
          CURRENT=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -1)
          echo "version=${CURRENT:-v0.0.0}" >> "$GITHUB_OUTPUT"
          echo "Current version: ${CURRENT:-v0.0.0}"

      - name: Calculate new version
        id: new
        run: |
          VERSION="${{ steps.current.outputs.version }}"
          VERSION="${VERSION#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW="v${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "New version: $NEW"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ESPHome
        run: pip install esphome

      - name: Create dummy secrets
        run: |
          cat > secrets.yaml <<'EOF'
          wifi_ssid: "test-ssid"
          wifi_password: "test-password"
          right_dishwasher_mac: "00:06:80:00:00:01"
          right_dishwasher_pin: "000001"
          kitchen_range_mac: "00:06:80:00:00:02"
          kitchen_range_pin: "000002"
          main_fridge_mac: "00:06:80:00:00:03"
          main_fridge_pin: "000003"
          EOF

      - name: Validate configs before tagging
        run: |
          REF="${GITHUB_SHA}"
          sed -i -E "s#ref: (v[0-9]+\.[0-9]+\.[0-9]+|main)#ref: ${REF}#" \
            cove-minimal-dishwasher.yaml wolf-minimal-range.yaml wolf-minimal-fridge.yaml
          for yaml in cove-minimal-dishwasher.yaml wolf-minimal-range.yaml wolf-minimal-fridge.yaml; do
            echo "::group::Validating $yaml"
            esphome config "$yaml"
            echo "::endgroup::"
          done
          # Restore the originals so the later sed/commit step operates on clean files.
          git checkout -- cove-minimal-dishwasher.yaml wolf-minimal-range.yaml wolf-minimal-fridge.yaml

      - name: Create tag on current HEAD
        run: |
          git tag "${{ steps.new.outputs.version }}"
          git push origin "${{ steps.new.outputs.version }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.new.outputs.version }}" \
            --generate-notes \
            --title "${{ steps.new.outputs.version }}" \
            ${{ inputs.prerelease && '--prerelease' || '' }}

      - name: Update version references
        run: |
          NEW="${{ steps.new.outputs.version }}"
          sed -i "s/ref: v[0-9]*\.[0-9]*\.[0-9]*/ref: ${NEW}/g" \
            wolf-minimal-fridge.yaml \
            wolf-minimal-range.yaml \
            cove-minimal-dishwasher.yaml \
            README.adoc

      - name: Create version bump PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NEW="${{ steps.new.outputs.version }}"
          BRANCH="chore/bump-refs-${NEW}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "chore: bump version refs to ${NEW}"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "chore: bump version refs to ${NEW}" \
            --body "Auto-generated by the release workflow. Updates all \`ref:\` entries to \`${NEW}\`." \
            --label "automated"
